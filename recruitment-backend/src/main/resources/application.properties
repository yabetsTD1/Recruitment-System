spring.application.name=recruitment-backend
server.port=8080

# MySql
spring.datasource.url=jdbc:mysql://localhost:3306/recruitment_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA

# JPA ? validate means Hibernate checks schema but does NOT create/drop tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=insa-recruitment-super-secret-key-2025-must-be-at-least-256-bits-long
jwt.expiration=86400000
