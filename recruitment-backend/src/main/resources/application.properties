spring.application.name=recruitment-backend
server.address=0.0.0.0
server.port=8080

# DataSource
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/recruitment_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

# JWT (local tokens)
jwt.secret=insa-recruitment-super-secret-key-2025-must-be-at-least-256-bits-long
jwt.expiration=86400000

# Keycloak / OAuth2 Resource Server
keycloak.realm=recruitment-system
keycloak.auth-server-url=http://localhost:9090
keycloak.client-id=recruitment-app

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/recruitment-system
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/recruitment-system/protocol/openid-connect/certs
